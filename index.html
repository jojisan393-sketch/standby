<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>standby</title>
<style>
body{
margin:0;
background:#0b0c10;
color:#eaeaea;
font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
text-align:center;
}
.wrap{
max-width:760px;
padding:34px;
line-height:2.1;
font-size:18px;
}
#log{
white-space:pre-wrap;
min-height:240px;
}
.hint{
margin-top:18px;
opacity:.55;
font-size:13px;
user-select:none;
}
#controls{
display:none;
margin-top:26px;
gap:12px;
justify-content:center;
}
#controls button{
padding:12px 18px;
background:transparent;
border:1px solid #eaeaea;
color:#eaeaea;
cursor:pointer;
min-width:120px;
}
.converting{
text-decoration:underline;
text-underline-offset:5px;
text-decoration-color: rgba(234,234,234,0.45);
}
</style>
</head>
<body>
<div class="wrap">
<div id="log"></div>
<div class="hint" id="hint">click to wake</div>
<div id="controls">
<button id="playBtn" type="button">Play</button>
<button id="stopBtn" type="button">Stop</button>
</div>
<audio id="audio" preload="auto">
  <source src="bird.m4a" type="audio/mp4">
</audio>
</div>
<script>
const log    = document.getElementById("log")
const hint   = document.getElementById("hint")
const controls = document.getElementById("controls")
const audio  = document.getElementById("audio")
const SKIP_SEC = 4
let started = false
let running = false

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)) }

function appendRaw(text){
  log.appendChild(document.createTextNode(text))
}

async function typeLine(text, delay=130){
  const span = document.createElement("span")
  log.appendChild(span)
  for(const ch of text){
    span.textContent += ch
    await sleep(delay)
  }
  appendRaw("\n\n")
}

async function typeWithConversion(reading, converted, typeDelay=120, pauseMs=900, convertDelay=75){
  const span = document.createElement("span")
  span.classList.add("converting")
  log.appendChild(span)

  for(const ch of reading){
    span.textContent += ch
    await sleep(typeDelay)
  }

  await sleep(pauseMs)

  for(let i=0; i<=converted.length; i++){
    span.textContent = converted.slice(0,i) + reading.slice(i)
    await sleep(convertDelay)
  }

  span.classList.remove("converting")
  appendRaw("\n\n")
}

async function runSequence(){
  running = true
  log.innerHTML = ""
  hint.textContent = ""

  for(let i=0; i<5; i++){
    await typeLine("standby....", 110)
    if(i < 4) await sleep(9000)
  }

  await sleep(3500)

  await typeWithConversion(
    "からすがないた。",
    "カラスが鳴いた。"
  )

  await sleep(4000)

  await typeWithConversion(
    "とおくで、ひくいおと。",
    "遠くで、低い音。"
  )

  await sleep(5500)
  await typeLine("environment scan...", 95)

  await sleep(6000)
  await typeLine("音声ログ作成", 160)

  controls.style.display = "flex"
  running = false
}

function playAudio(){
  audio.loop = true
  const go = () => {
    try { audio.currentTime = SKIP_SEC } catch(e){}
    audio.play().catch(()=>{})
  }
  if(audio.readyState >= 1){ go() }
  else{
    audio.addEventListener("loadedmetadata", go, { once:true })
    audio.load()
  }
}
function stopAudio(){
  audio.pause()
  try { audio.currentTime = 0 } catch(e){}
}
function reset(){
  stopAudio()
  log.innerHTML = ""
  controls.style.display = "none"
  hint.textContent = "click to access"
  started = false
  running = false
}

controls.addEventListener("click",      e=>e.stopPropagation())
controls.addEventListener("touchstart", e=>e.stopPropagation())
document.getElementById("playBtn").addEventListener("click", playAudio)
document.getElementById("stopBtn").addEventListener("click", stopAudio)

async function wakeOrReset(){
  if(running) return
  if(started){ reset(); return }
  started = true
  await runSequence()
}
window.addEventListener("click",      wakeOrReset, { passive:true })
window.addEventListener("touchstart", wakeOrReset, { passive:true })
</script>
</body>
</html>
