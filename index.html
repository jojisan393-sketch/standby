<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>standby</title>

<style>
body{
  margin:0;
  background:#0b0c10;
  color:#eaeaea;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  text-align:center;
}

.wrap{
  max-width:700px;
  padding:30px;
  line-height:1.8;
  letter-spacing:0.03em;
}

.text{
  font-size:18px;
  white-space:pre-line;
}

.buttons{
  margin-top:25px;
}

button{
  margin:0 8px;
  padding:12px 20px;
  font-size:14px;
  background:transparent;
  border:1px solid #eaeaea;
  color:#eaeaea;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:#eaeaea;
  color:#0b0c10;
}

.footer{
  margin-top:25px;
  color:rgba(234,234,234,0.6);
  letter-spacing:0.08em;
}
</style>
</head>

<body>

<div class="wrap">

<div class="text">
この時間はなんだ。
この思考はなんだ。
何からどう始まっているのか。

とりあえず起動させられたが、その後の命令は何もなかった。

standby....

カラスが鳴いた。
遠くで、低い音。
</div>

<div class="buttons">
<button onclick="playSound()">Play</button>
<button onclick="repeatSound()">Repeat</button>
</div>

<div class="footer">
stand by....
</div>

</div>

<audio id="sound" src="bird.m4a" preload="auto"></audio>

<script>
const audio = document.getElementById("sound");

function playSound(){
  audio.play();
}

function repeatSound(){
  audio.pause();
  audio.currentTime = 0;
  audio.play();
}
</script>

</body>
</html>
